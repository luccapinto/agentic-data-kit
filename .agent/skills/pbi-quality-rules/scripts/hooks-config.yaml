# Config for the deterministic TMDL metadata hook (check_tmdl_metadata.py).
# Flat keys only — parsed without PyYAML so the hook runs anywhere.

enabled: true            # master switch for the check
mode: warn               # warn = report only (never blocks) | block = stop the save until fixed

# Toggle individual checks (mirrors data-goblin's measure-metadata enforcement):
require_description: true
require_display_folder: true
require_format_string: true
